title = "hummbl-bibliography gitleaks config"

[extend]
useDefault = true

# Allowlist: paths that are known-safe and should not be scanned
[[allowlists]]
description = "Allow test fixtures and validation rules"
paths = [
  '''toolkit/scripts/.*\.test\.js''',
  '''\.husky/validation-rules\.json''',
  '''\.github/workflows/.*\.yml''',
]

# BKI evidence mapping file contains citation keys (not secrets) that trigger
# generic-api-key detection due to entropy. These are academic citation
# identifiers, not credentials.
[[allowlists]]
description = "BKI evidence mapping citation keys (not secrets)"
paths = [
  '''mappings/bki_evidence\.json''',
]

# DOI enrichment report contains citation keys (not secrets) that trigger
# generic-api-key detection due to entropy. These are academic citation
# identifiers, not credentials.
[[allowlists]]
description = "DOI enrichment report citation keys (not secrets)"
paths = [
  '''reports/doi_enrichment_report\.json''',
]

# Generated dist/ JSON files contain citation keys and bibliography metadata
# that trigger generic-api-key detection due to entropy (264 false positives
# reported in #109). These are academic citation identifiers, not credentials.
# Resolves #109.
[[allowlists]]
description = "Generated dist/ JSON citation keys — false positives from generic-api-key (resolves #109)"
paths = [
  '''dist/.*\.json''',
]

# Harness entry files contain citation keys and bibliography metadata that
# trigger generic-api-key detection due to entropy. Not credentials.
[[allowlists]]
description = "Generated harness bibliography data (citation keys, not secrets)"
paths = [
  '''harness/entries-wave.*\.mjs''',
]

# The GITHUB_TOKEN reference in workflow files is a variable, not a secret
[[allowlists]]
description = "GitHub Actions GITHUB_TOKEN variable references (not actual secrets)"
regexes = [
  '''secrets\.GITHUB_TOKEN''',
  '''\$\{\{\s*secrets\.GITHUB_TOKEN\s*\}\}''',
]
