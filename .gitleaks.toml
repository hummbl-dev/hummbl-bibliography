title = "hummbl-bibliography gitleaks config"

[extend]
useDefault = true

# Allowlist: paths that are known-safe and should not be scanned
[[allowlists]]
description = "Allow test fixtures and validation rules"
paths = [
  '''toolkit/scripts/.*\.test\.js''',
  '''\.husky/validation-rules\.json''',
  '''\.github/workflows/.*\.yml''',
]

# BKI evidence mapping file contains citation keys (not secrets) that trigger
# generic-api-key detection due to entropy. These are academic citation
# identifiers, not credentials.
[[allowlists]]
description = "BKI evidence mapping citation keys (not secrets)"
paths = [
  '''mappings/bki_evidence\.json''',
]

# The GITHUB_TOKEN reference in workflow files is a variable, not a secret
[[allowlists]]
description = "GitHub Actions GITHUB_TOKEN variable references (not actual secrets)"
regexes = [
  '''secrets\.GITHUB_TOKEN''',
  '''\$\{\{\s*secrets\.GITHUB_TOKEN\s*\}\}''',
]
