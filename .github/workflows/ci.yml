name: CI

on:
  push:
    branches:
      - main
      - 'q4-2025-enhancement'
      - 'doi-enrichment-phase2'
      - 'feat/security-enhancements'
      - 'fix/node-version-update'
      - 'copilot/*'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  actions: write
  security-events: write

jobs:
  build-and-test:
    name: Lint / Test / Audit (Node ${{ matrix.node-version }})
    runs-on: [self-hosted, Linux, X64, wsl, bibliography]
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [24]
    steps:
      - name: Checkout
        actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Use Node.js ${{ matrix.node-version }}
        actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: toolkit/package-lock.json

      - name: Install dependencies
        run: |
          cd toolkit
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint
        run: |
          cd toolkit
          if npm run 2>/dev/null | grep -q 'lint'; then npm run lint; else echo "No lint script found"; fi

      - name: Run tests
        run: |
          cd toolkit
          if npm run 2>/dev/null | grep -q 'test'; then npm test --if-present --silent; else echo "No test script found"; fi
        env:
          CI: true

      - name: Build (if applicable)
        run: |
          cd toolkit
          if npm run 2>/dev/null | grep -q 'build'; then npm run build --if-present; else echo "No build script found"; fi

      - name: Dependency audit (warn on high)
        # Non-blocking: warn-only so Dependabot bumps and security research
        # can proceed without blocking bibliography validation.
        continue-on-error: true
        run: |
          cd toolkit
          if [ -f package-lock.json ] || [ -f yarn.lock ]; then
            npm audit --omit=dev --audit-level=high || echo "::warning::Vulnerabilities found (>=high) — see npm audit output above"
          else
            echo "No lockfile found — consider adding package-lock.json or yarn.lock"
          fi

      - name: Upload test artifacts (results, coverage)
        if: always()
        actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-node${{ matrix.node-version }}
          path: |
            toolkit/coverage
            toolkit/test-results

  codeql:
    name: CodeQL Static Analysis
    runs-on: [self-hosted, Linux, X64, wsl, bibliography]
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Initialize CodeQL
        github/codeql-action/init@3b0bd1d116c0bde30213346b22d4f634d96a2fb0 # v3
        with:
          languages: javascript

      - name: Autobuild
        github/codeql-action/autobuild@3b0bd1d116c0bde30213346b22d4f634d96a2fb0 # v3

      - name: Run CodeQL analysis
        github/codeql-action/analyze@3b0bd1d116c0bde30213346b22d4f634d96a2fb0 # v3
