name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 9:00 UTC
  workflow_dispatch:

# Set the required permissions at the job level
permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    # Ensure the job has the necessary permissions
    permissions:
      contents: read
      security-events: write
      pull-requests: write
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify repository structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo "Toolkit contents:"
          ls -la toolkit/
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./toolkit
        run: |
          echo "Installing in: $(pwd)"
          npm ci
      
      - name: Run npm audit
        id: audit
        working-directory: ./toolkit
        run: |
          echo "Running npm audit in: $(pwd)"
          npm audit --json > ../audit-report.json 2>/dev/null || true
          node scripts/parse-audit-report.js ../audit-report.json >> "$GITHUB_OUTPUT"
          ls -la ../audit-report.json

      - name: Upload audit report
        if: always() && steps.audit.outputs.audit_valid == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 7
          compression-level: 6
          if-no-files-found: error

      - name: Upload raw diagnostic output on infrastructure failure
        if: always() && steps.audit.outputs.audit_valid != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-INVALID-diagnostic
          path: audit-report.json
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: Comment on PR if vulnerabilities found
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.audit.outputs.audit_valid == 'true' && steps.audit.outputs.vulnerability_count > 0
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const count = parseInt('${{ steps.audit.outputs.vulnerability_count }}', 10) || 0;
            const high = parseInt('${{ steps.audit.outputs.vuln_high }}', 10) || 0;
            const critical = parseInt('${{ steps.audit.outputs.vuln_critical }}', 10) || 0;
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Security Audit: Vulnerabilities Found**\n\nTotal: ${count} (high: ${high}, critical: ${critical})\n\nSee the workflow run and uploaded audit-report artifact for details.`
              });
              console.log('Comment added successfully');
            } catch (error) {
              console.error('Error adding comment:', error);
              core.setFailed('Failed to add PR comment');
            }

      - name: Report infrastructure failure
        if: failure() && steps.audit.outcome == 'failure'
        run: |
          echo "::error::Security audit infrastructure failure (error: ${{ steps.audit.outputs.error }})"
          echo "The npm audit command did not produce a valid report."
          echo "This may indicate a network, registry, or tooling failure."
          exit 1
