name: Weekly Statistics Report

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: [self-hosted, Linux, X64, wsl, bibliography]
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: toolkit/package-lock.json
        
    - name: Install dependencies
      run: |
        cd toolkit
        npm ci
        
    - name: Generate statistics report
      env:
        NO_COLOR: '1'
        FORCE_COLOR: '0'
      run: |
        cd toolkit
        REPORT="../reports/$(date +%Y-%m-%d)-stats.md"
        echo "# Weekly Statistics Report — $(date +%Y-%m-%d)" > "$REPORT"
        echo "" >> "$REPORT"
        echo '```' >> "$REPORT"
        node src/stats.js ../bibliography 2>&1 >> "$REPORT"
        echo '```' >> "$REPORT"
        echo "" >> "$REPORT"
        echo "---" >> "$REPORT"
        echo "" >> "$REPORT"
        echo "## JSON Summary" >> "$REPORT"
        echo "" >> "$REPORT"
        echo '```json' >> "$REPORT"
        node src/stats.js ../bibliography --json 2>/dev/null >> "$REPORT"
        echo '```' >> "$REPORT"
        
    - name: Commit report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add reports/
        git diff --staged --quiet || git commit -m "chore: weekly statistics report $(date +%Y-%m-%d)"
        git push
